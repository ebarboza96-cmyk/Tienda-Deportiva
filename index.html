<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tienda Deportiva — Camisetas de Fútbol</title>
<style>
  :root{
    --bg:#0c0f14; --panel:#141a22; --panel2:#1b232e; --line:#26303d;
    --txt:#eef3f8; --muted:#9fb0c2; --accent:#28e07b; --accent2:#13b85f;
    --danger:#ff5d5d; --warn:#ffb43b; --info:#3fa9ff; --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--txt); -webkit-font-smoothing:antialiased;
  }
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:var(--accent)}

  /* Header */
  header{
    position:sticky;top:0;z-index:40;background:rgba(12,15,20,.92);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  }
  .bar{max-width:1240px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:.3px}
  .brand .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--info));display:grid;place-items:center;color:#04140b;font-size:18px}
  .grow{flex:1}
  .search{flex:1;min-width:180px;max-width:520px;position:relative}
  .search input{width:100%;padding:11px 14px 11px 38px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--txt);font-size:15px}
  .search svg{position:absolute;left:11px;top:11px;opacity:.6}
  .btn{padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--txt);font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);color:#04140b;border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent2)}
  .btn.ghost{background:transparent}
  .btn.danger{color:var(--danger);border-color:#43222a}
  .btn.sm{padding:6px 10px;font-size:13px;border-radius:9px}

  /* Filters */
  .filters{max-width:1240px;margin:0 auto;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .chip{padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;font-weight:600}
  .chip.active{background:var(--accent);color:#04140b;border-color:var(--accent)}
  .count{color:var(--muted);font-size:13px;margin-left:auto}

  /* Catalog grid */
  main{max-width:1240px;margin:0 auto;padding:18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .12s,border-color .12s}
  .card:hover{transform:translateY(-3px);border-color:#34465a}
  .thumb{position:relative;aspect-ratio:1/1;background:#0a0d12;cursor:pointer;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .ph{width:100%;height:100%;display:grid;place-items:center;color:#46566a;font-size:13px;text-align:center;padding:18px}
  .badge{position:absolute;top:9px;left:9px;background:rgba(0,0,0,.62);color:#fff;font-size:11px;font-weight:700;padding:4px 8px;border-radius:8px;backdrop-filter:blur(4px)}
  .badge.out{background:rgba(255,93,93,.92)}
  .gallery-count{position:absolute;bottom:9px;right:9px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 7px;border-radius:7px;display:flex;gap:4px;align-items:center}
  .cbody{padding:12px 13px;display:flex;flex-direction:column;gap:8px;flex:1}
  .cname{font-weight:700;font-size:14px;line-height:1.3;min-height:36px}
  .csub{color:var(--muted);font-size:12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .pill{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:2px 7px;font-size:11px;color:var(--txt)}
  .sizes{display:flex;gap:5px;flex-wrap:wrap}
  .sz{min-width:26px;text-align:center;padding:3px 6px;border:1px solid var(--line);border-radius:7px;font-size:11px;font-weight:700;color:var(--muted)}
  .sz.ok{color:var(--txt);border-color:#34465a}
  .cfoot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:6px}
  .price{font-weight:800;font-size:17px;color:var(--accent)}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(4,7,11,.74);backdrop-filter:blur(4px);z-index:60;display:none;align-items:center;justify-content:center;padding:18px}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;max-width:920px;width:100%;max-height:92vh;overflow:auto}
  .modal-x{position:sticky;top:0;display:flex;justify-content:flex-end;padding:10px;background:linear-gradient(to bottom,var(--panel),transparent)}
  .iconbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:18px;display:grid;place-items:center}
  .pdetail{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;padding:0 22px 24px}
  @media(max-width:760px){.pdetail{grid-template-columns:1fr}}
  .gmain{aspect-ratio:1/1;background:#0a0d12;border-radius:14px;overflow:hidden}
  .gmain img{width:100%;height:100%;object-fit:cover}
  .gthumbs{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .gthumbs img{width:58px;height:58px;object-fit:cover;border-radius:9px;border:2px solid transparent;cursor:pointer;opacity:.7}
  .gthumbs img.sel{border-color:var(--accent);opacity:1}
  .pinfo h2{margin:0 0 4px;font-size:20px}
  .kv{display:flex;gap:8px;margin:6px 0;font-size:14px}
  .kv b{color:var(--muted);min-width:92px;font-weight:600}
  .price-lg{font-size:30px;font-weight:800;color:var(--accent);margin:14px 0}
  .note{color:var(--muted);font-size:12px}

  /* Admin */
  .admin{display:none}
  .admin.show{display:block}
  .catalogwrap.hide{display:none}
  .adminbar{max-width:1240px;margin:0 auto;padding:14px 18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:9px 15px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700;font-size:14px}
  .tab.active{background:var(--panel2);color:var(--txt);border-color:var(--accent)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:6px 0 16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .stat .l{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:24px;font-weight:800;margin-top:4px}
  .stat .v.green{color:var(--accent)} .stat .v.warn{color:var(--warn)} .stat .v.info{color:var(--info)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}
  .panel h3{margin:0 0 12px;font-size:16px}
  .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;align-items:end}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  input,select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:14px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:10px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
  tr:hover td{background:rgba(255,255,255,.02)}
  .tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .tag.apartado{background:rgba(255,180,59,.16);color:var(--warn)}
  .tag.entregado{background:rgba(40,224,123,.16);color:var(--accent)}
  .tag.cancelado{background:rgba(255,93,93,.16);color:var(--danger)}
  .tag.efectivo{background:rgba(40,224,123,.14);color:var(--accent)}
  .tag.sinpe{background:rgba(63,169,255,.16);color:var(--info)}
  .tag.tarjeta{background:rgba(180,140,255,.18);color:#c0a6ff}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .scroll-x{overflow-x:auto}
  .login-box{max-width:380px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px}
  .login-box h2{margin:0 0 6px}
  .footer{max-width:1240px;margin:0 auto;padding:24px 18px 40px;color:var(--muted);font-size:12px;text-align:center}
  .hidden{display:none!important}
  .wa{background:#25D366;color:#04140b;border-color:#25D366}
  .wa:hover{filter:brightness(1.05)}
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="brand"><span class="dot">⚽</span><span id="brandName">Tienda Deportiva</span></div>
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" type="search" placeholder="Buscar equipo, jugador..." />
    </div>
    <button class="btn ghost" id="adminBtn">🔒 Administración</button>
  </div>
  <div class="filters" id="filters"></div>
  <div style="height:12px"></div>
</header>

<!-- CATALOGO PUBLICO -->
<div class="catalogwrap" id="catalogwrap">
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty hidden" id="noResults">No se encontraron camisetas con ese filtro.</div>
  </main>
  <div class="footer" id="pubFooter"></div>
</div>

<!-- AREA PRIVADA -->
<div class="admin" id="admin">
  <div class="adminbar">
    <div class="tabs">
      <button class="tab active" data-tab="pedidos">📦 Pedidos (apartados)</button>
      <button class="tab" data-tab="ventas">💰 Ventas (caja)</button>
      <button class="tab" data-tab="inventario">📋 Inventario</button>
      <button class="tab" data-tab="config">⚙️ Ajustes</button>
    </div>
    <div class="grow"></div>
    <button class="btn ghost" id="backCatalog">← Ver catálogo</button>
    <button class="btn danger" id="logoutBtn">Salir</button>
  </div>
  <main>
    <section id="tab-pedidos"></section>
    <section id="tab-ventas" class="hidden"></section>
    <section id="tab-inventario" class="hidden"></section>
    <section id="tab-config" class="hidden"></section>
  </main>
</div>

<!-- MODAL PRODUCTO -->
<div class="overlay" id="prodOverlay">
  <div class="modal" id="prodModal">
    <div class="modal-x"><button class="iconbtn" onclick="closeProd()">✕</button></div>
    <div class="pdetail" id="prodDetail"></div>
  </div>
</div>

<!-- MODAL LOGIN -->
<div class="overlay" id="loginOverlay">
  <div class="login-box">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Acceso privado</h2>
      <button class="iconbtn" onclick="closeLogin()">✕</button>
    </div>
    <p class="note" style="margin-top:0">Pedidos y ventas son solo para administración.</p>
    <label>Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    <div id="loginErr" class="note" style="color:var(--danger);min-height:16px;margin-top:6px"></div>
    <button class="btn primary" style="width:100%;justify-content:center;margin-top:8px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
