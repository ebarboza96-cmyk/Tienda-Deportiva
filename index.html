<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tienda Deportiva — Camisetas de Fútbol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Paleta premium derivada del logo (mango futbolista): negro cálido,
       oro como acento principal, verde marca secundario, rojo alertas. */
    --bg:oklch(0.17 0.013 80);
    --bg2:oklch(0.20 0.014 82);
    --panel:oklch(0.215 0.015 84);
    --panel2:oklch(0.255 0.016 86);
    --line:oklch(0.32 0.016 86);
    --line2:oklch(0.40 0.020 88);
    --txt:oklch(0.95 0.012 90);
    --muted:oklch(0.72 0.022 88);
    --gold:oklch(0.82 0.125 86);
    --gold2:oklch(0.74 0.135 80);
    --ink:oklch(0.22 0.04 80);
    --green:oklch(0.74 0.155 150);
    --danger:oklch(0.68 0.19 26);
    --warn:oklch(0.82 0.13 78);
    --info:oklch(0.74 0.11 232);
    --accent:var(--gold);
    --radius:18px;
    --shadow:0 1px 0 oklch(1 0 0 / .04) inset, 0 18px 40px -24px oklch(0 0 0 / .7);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Hanken Grotesk",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:
      radial-gradient(120% 80% at 80% -10%, oklch(0.30 0.05 86 / .35), transparent 60%),
      radial-gradient(90% 60% at -10% 0%, oklch(0.32 0.09 150 / .14), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    color:var(--txt); -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  h1,h2,h3,.brand,.price,.price-lg,.stat .v,.cname{
    font-family:"Bricolage Grotesque","Hanken Grotesk",sans-serif;
    font-weight:700; letter-spacing:-.01em;
  }
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:var(--gold);text-decoration:none}

  /* Header */
  header{
    position:sticky;top:0;z-index:40;
    background:oklch(0.17 0.013 80 / .82);
    backdrop-filter:blur(16px) saturate(1.2);
    border-bottom:1px solid var(--line);
  }
  .bar{max-width:1240px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;font-size:21px;letter-spacing:-.02em}
  .brand .dot{
    width:34px;height:34px;border-radius:11px;
    background:linear-gradient(150deg,var(--gold),var(--gold2));
    display:grid;place-items:center;color:var(--ink);font-size:18px;
    box-shadow:0 6px 16px -8px var(--gold2);
  }
  .grow{flex:1}
  .search{flex:1;min-width:180px;max-width:520px;position:relative}
  .search input{width:100%;padding:12px 14px 12px 40px;border-radius:13px;border:1px solid var(--line);background:var(--bg2);color:var(--txt);font-size:15px;transition:border-color .15s,box-shadow .15s}
  .search input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px oklch(0.82 0.125 86 / .14)}
  .search svg{position:absolute;left:13px;top:13px;opacity:.55}
  .btn{padding:11px 15px;border-radius:13px;border:1px solid var(--line);background:var(--panel);color:var(--txt);font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;transition:border-color .15s,background .15s,transform .1s}
  .btn:hover{border-color:var(--line2);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:linear-gradient(150deg,var(--gold),var(--gold2));color:var(--ink);border-color:transparent;font-weight:700;box-shadow:0 8px 20px -12px var(--gold2)}
  .btn.primary:hover{filter:brightness(1.05);border-color:transparent}
  .btn.ghost{background:transparent}
  .btn.danger{color:var(--danger);border-color:oklch(0.40 0.10 26 / .6)}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:10px}

  /* Filters */
  .filters{max-width:1240px;margin:0 auto;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .chip{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;font-weight:600;transition:color .15s,border-color .15s}
  .chip:hover{color:var(--txt);border-color:var(--line2)}
  .chip.active{background:linear-gradient(150deg,var(--gold),var(--gold2));color:var(--ink);border-color:transparent;font-weight:700}
  .count{color:var(--muted);font-size:13px;margin-left:auto}

  /* Catalog grid */
  main{max-width:1240px;margin:0 auto;padding:22px 20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .18s cubic-bezier(.2,.7,.3,1),border-color .18s}
  .card:hover{transform:translateY(-5px);border-color:var(--line2)}
  .thumb{position:relative;aspect-ratio:1/1;background:var(--bg2);cursor:pointer;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .35s cubic-bezier(.2,.7,.3,1)}
  .card:hover .thumb img{transform:scale(1.05)}
  .thumb .ph{width:100%;height:100%;display:grid;place-items:center;color:var(--muted);font-size:13px;text-align:center;padding:18px}
  .badge{position:absolute;top:10px;left:10px;background:oklch(0.18 0.01 80 / .7);color:#fff;font-size:11px;font-weight:700;padding:5px 9px;border-radius:9px;backdrop-filter:blur(6px);letter-spacing:.02em}
  .badge.out{background:oklch(0.68 0.19 26 / .92)}
  .gallery-count{position:absolute;bottom:10px;right:10px;background:oklch(0.18 0.01 80 / .68);color:#fff;font-size:11px;padding:4px 8px;border-radius:8px;display:flex;gap:4px;align-items:center;backdrop-filter:blur(6px)}
  .cbody{padding:14px 15px 15px;display:flex;flex-direction:column;gap:9px;flex:1}
  .cname{font-size:15px;line-height:1.28;min-height:38px}
  .csub{color:var(--muted);font-size:12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .pill{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:3px 8px;font-size:11px;color:var(--txt)}
  .pill.print{background:oklch(0.82 0.125 86 / .14);border-color:oklch(0.82 0.125 86 / .35);color:var(--gold);font-weight:700}
  .print-lg{margin:10px 0;font-size:15px;color:var(--muted)}
  .print-lg b{color:var(--gold);font-size:17px}
  .sizes{display:flex;gap:5px;flex-wrap:wrap}
  .sz{min-width:28px;text-align:center;padding:4px 7px;border:1px solid var(--line);border-radius:8px;font-size:11px;font-weight:700;color:oklch(0.55 0.02 88)}
  .sz.ok{color:var(--txt);border-color:var(--line2)}
  .cfoot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:8px}
  .price{font-weight:800;font-size:19px;color:var(--gold)}

  /* Modal */
  .overlay{position:fixed;inset:0;background:oklch(0.12 0.008 80 / .76);backdrop-filter:blur(6px);z-index:60;display:none;align-items:center;justify-content:center;padding:18px}
  .overlay.open{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:22px;max-width:940px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 40px 90px -40px oklch(0 0 0 / .8)}
  .modal-x{position:sticky;top:0;display:flex;justify-content:flex-end;padding:12px;background:linear-gradient(to bottom,var(--panel),transparent);z-index:2}
  .iconbtn{width:36px;height:36px;border-radius:11px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:18px;display:grid;place-items:center;transition:border-color .15s}
  .iconbtn:hover{border-color:var(--line2)}
  .pdetail{display:grid;grid-template-columns:1.1fr 1fr;gap:24px;padding:0 24px 26px}
  @media(max-width:760px){.pdetail{grid-template-columns:1fr}}
  .gmain{aspect-ratio:1/1;background:var(--bg2);border-radius:16px;overflow:hidden}
  .gmain img{width:100%;height:100%;object-fit:cover}
  .gthumbs{display:flex;gap:9px;margin-top:11px;flex-wrap:wrap}
  .gthumbs img{width:60px;height:60px;object-fit:cover;border-radius:11px;border:2px solid transparent;cursor:pointer;opacity:.65;transition:opacity .15s,border-color .15s}
  .gthumbs img:hover{opacity:.9}
  .gthumbs img.sel{border-color:var(--gold);opacity:1}
  .pinfo h2{margin:0 0 6px;font-size:23px;line-height:1.2}
  .kv{display:flex;gap:8px;margin:7px 0;font-size:14px}
  .kv b{color:var(--muted);min-width:92px;font-weight:600}
  .price-lg{font-size:34px;font-weight:800;color:var(--gold);margin:16px 0}
  .note{color:var(--muted);font-size:12px}

  /* Admin */
  .admin{display:none}
  .admin.show{display:block}
  .catalogwrap.hide{display:none}
  .adminbar{max-width:1240px;margin:0 auto;padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:10px 16px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-weight:700;font-size:14px;transition:color .15s,border-color .15s}
  .tab:hover{color:var(--txt)}
  .tab.active{background:var(--panel2);color:var(--gold);border-color:oklch(0.82 0.125 86 / .5)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:8px 0 18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
  .stat .l{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .stat .v{font-size:26px;font-weight:800;margin-top:5px}
  .stat .v.green{color:var(--green)} .stat .v.warn{color:var(--warn)} .stat .v.info{color:var(--info)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
  .panel h3{margin:0 0 14px;font-size:17px}
  .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;align-items:end}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  input,select,textarea{width:100%;padding:11px 13px;border-radius:11px;border:1px solid var(--line);background:var(--bg2);color:var(--txt);font-size:14px;transition:border-color .15s,box-shadow .15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px oklch(0.82 0.125 86 / .14)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
  tr:hover td{background:oklch(1 0 0 / .025)}
  .tag{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
  .tag.apartado{background:oklch(0.82 0.13 78 / .16);color:var(--warn)}
  .tag.entregado{background:oklch(0.74 0.155 150 / .16);color:var(--green)}
  .tag.cancelado{background:oklch(0.68 0.19 26 / .16);color:var(--danger)}
  .tag.efectivo{background:oklch(0.74 0.155 150 / .14);color:var(--green)}
  .tag.sinpe{background:oklch(0.74 0.11 232 / .16);color:var(--info)}
  .tag.tarjeta{background:oklch(0.66 0.14 300 / .18);color:oklch(0.78 0.12 300)}
  .empty{padding:34px;text-align:center;color:var(--muted)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .scroll-x{overflow-x:auto}
  .login-box{max-width:390px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:28px;box-shadow:0 40px 90px -40px oklch(0 0 0 / .8)}
  .login-box h2{margin:0 0 6px}
  .footer{max-width:1240px;margin:0 auto;padding:28px 20px 44px;color:var(--muted);font-size:12px;text-align:center}
  .hidden{display:none!important}
  .wa{background:#25D366;color:oklch(0.20 0.03 150);border-color:#25D366;font-weight:700}
  .wa:hover{filter:brightness(1.05);border-color:#25D366}
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="brand"><span class="dot">⚽</span><span id="brandName">Tienda Deportiva</span></div>
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" type="search" placeholder="Buscar equipo, jugador..." />
    </div>
    <button class="btn ghost" id="adminBtn">🔒 Administración</button>
  </div>
  <div class="filters" id="filters"></div>
  <div style="height:12px"></div>
</header>

<!-- CATALOGO PUBLICO -->
<div class="catalogwrap" id="catalogwrap">
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty hidden" id="noResults">No se encontraron camisetas con ese filtro.</div>
  </main>
  <div class="footer" id="pubFooter"></div>
</div>

<!-- AREA PRIVADA -->
<div class="admin" id="admin">
  <div class="adminbar">
    <div class="tabs">
      <button class="tab active" data-tab="pedidos">📦 Pedidos (apartados)</button>
      <button class="tab" data-tab="ventas">💰 Ventas (caja)</button>
      <button class="tab" data-tab="inventario">📋 Inventario</button>
      <button class="tab" data-tab="config">⚙️ Ajustes</button>
    </div>
    <div class="grow"></div>
    <button class="btn ghost" id="backCatalog">← Ver catálogo</button>
    <button class="btn danger" id="logoutBtn">Salir</button>
  </div>
  <main>
    <section id="tab-pedidos"></section>
    <section id="tab-ventas" class="hidden"></section>
    <section id="tab-inventario" class="hidden"></section>
    <section id="tab-config" class="hidden"></section>
  </main>
</div>

<!-- MODAL PRODUCTO -->
<div class="overlay" id="prodOverlay">
  <div class="modal" id="prodModal">
    <div class="modal-x"><button class="iconbtn" onclick="closeProd()">✕</button></div>
    <div class="pdetail" id="prodDetail"></div>
  </div>
</div>

<!-- MODAL LOGIN -->
<div class="overlay" id="loginOverlay">
  <div class="login-box">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Acceso privado</h2>
      <button class="iconbtn" onclick="closeLogin()">✕</button>
    </div>
    <p class="note" style="margin-top:0">Pedidos y ventas son solo para administración.</p>
    <label>Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    <div id="loginErr" class="note" style="color:var(--danger);min-height:16px;margin-top:6px"></div>
    <button class="btn primary" style="width:100%;justify-content:center;margin-top:8px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
